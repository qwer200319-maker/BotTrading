services:
  - type: worker
    name: bot-trading
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SCAN_ON_CANDLE_CLOSE
        value: "1"
      - key: SCAN_INTERVAL_SECONDS
        value: "60"
      - key: LOG_LEVEL
        value: "INFO"
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false
